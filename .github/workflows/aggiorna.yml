name: Sync Data

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa librerie
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Esegui lo Scraper
        run: python cgsse.py

      - name: Salva i cambiamenti nel repo
        run: |
          git config --global user.name "ScioperiBot"
          git config --global user.email "bot@sciopero.net"
          git add data_*.json
          git commit -m "Sync automatico dati" || exit 0
          git push

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
